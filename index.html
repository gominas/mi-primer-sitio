<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker - Gominas</title>
    <style>
        /* --- Diseño General (CSS) --- */
        body { font-family: sans-serif; background-color: #f4f4f9; color: #333; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; position: relative; overflow: hidden; }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        
        input { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        
        /* El Botón Principal */
        .btn { 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .btn:hover { background-color: #2ecc71; }

        /* --- El Efecto de Fuego (CSS) --- */
        #mensaje-fuego {
            display: none; /* Oculto por defecto */
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            
            /* Colores de fuego y degradado */
            background: linear-gradient(0deg, #ff4500 0%, #ff8c00 50%, #ffd700 100%);
            -webkit-background-clip: text; /* Corta el fondo con la forma del texto */
            background-clip: text;
            color: transparent; /* Hace el texto transparente para ver el fondo */
            
            /* Sombra para dar profundidad y brillo */
            text-shadow: 0 0 5px #ffa500, 0 0 15px #ff4500, 0 0 25px #ff0000;
            
            /* Animación de parpadeo de llama */
            animation: flamear 0.6s ease-in-out infinite alternate;
        }

        /* Definición de la animación de fuego */
        @keyframes flamear {
            0% { transform: scale(1) translateY(0); opacity: 0.9; text-shadow: 0 0 5px #ffa500, 0 0 15px #ff4500; }
            100% { transform: scale(1.05) translateY(-2px); opacity: 1; text-shadow: 0 0 7px #ffd700, 0 0 20px #ff8c00, 0 0 30px #ff4500; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Bienvenido!</h1>
        <p>Tu Gym Tracker personal.</p>
        
        <hr>
        
        <p><strong>¿Cómo funciona?</strong></p>
        <p>Asiste, suma <strong>1 punto</strong> y registra tu tiempo. Al final del mes, sumaremos todo.</p>

        <h3>Registrar sesión de hoy</h3>
        <input type="number" id="minutos-input" placeholder="Minutos entrenados (ej. 60)">
        <br>
        
        <button class="btn" id="boton-sumar">¡Sumar punto de hoy!</button>

        <div id="mensaje-fuego">¡Tu punto se ha sumado! 🔥</div>
    </div>

    <script>
        // 1. Buscamos los elementos en la página
        const boton = document.getElementById('boton-sumar');
        const mensaje = document.getElementById('mensaje-fuego');

        // 2. Decimos qué hacer cuando se haga CLIC
        boton.addEventListener('click', function() {
            // Mostramos el mensaje (estilo de CSS activado)
            mensaje.style.display = 'block';

            // Opcional: Ocultar el mensaje después de 3 segundos
            setTimeout(function() {
                mensaje.style.display = 'none';
            }, 3000); // 3000 milisegundos = 3 segundos
        });
    </script>

</body>
</html>
