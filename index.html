<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker - Gominas</title>
    <style>
        /* --- Diseño General (CSS) Estilo Neón --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0d1117; /* Fondo súper oscuro (azul casi negro) */
            color: #c9d1d9; /* Texto gris muy claro */
            text-align: center; 
            padding: 20px; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Centrado vertical */
        }
        
        .card { 
            background: #161b22; /* Fondo de la tarjeta oscuro */
            padding: 30px; 
            border-radius: 15px; 
            /* Borde y sombra Neón Azul Principal */
            border: 2px solid #58a6ff; 
            box-shadow: 0 0 10px #58a6ff, 0 0 20px #58a6ff, inset 0 0 10px #58a6ff;
            max-width: 400px; 
            width: 100%;
            position: relative; /* Importante para posicionar la flecha */
            overflow: visible; /* Permitir que la flecha sobresalga ligeramente si se desea */
        }

        h1 { 
            color: #fff; /* Título blanco */
            margin-bottom: 10px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; /* Espacio para la pesa */
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #58a6ff, 0 0 30px #58a6ff; /* Brillo Neón en Título */
        }

        /* --- Estilo de la Pesa (Solo Emoji) --- */
        .pesa {
            font-size: 1.2em; 
            filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 10px #58a6ff); /* Brillo propio para la pesa */
            /* He eliminado el estilo de texto anterior aquí */
        }

        hr { 
            border: 0; 
            border-top: 2px solid #30363d; /* Separador oscuro */
            margin: 25px 0; 
        }
        
        input { 
            padding: 12px; 
            width: calc(80% - 24px); 
            margin: 15px 0; 
            background-color: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 5px; 
            font-size: 16px; 
            color: #c9d1d9;
            transition: border 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #a371f7; /* Cambia a neón lila al enfocar */
            box-shadow: 0 0 5px #a371f7;
        }
        
        /* El Botón Principal - Neón Verde */
        .btn { 
            background-color: #238636; 
            color: white; 
            border: 2px solid #3fb950; 
            padding: 12px 24px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 5px #3fb950;
        }
        .btn:hover { 
            background-color: #2ea043; 
            box-shadow: 0 0 15px #3fb950, 0 0 25px #3fb950;
        }

        /* --- El Efecto de Fuego Neón (CSS) --- */
        #mensaje-fuego {
            display: none; /* Oculto por defecto */
            font-size: 26px;
            font-weight: bold;
            margin-top: 25px;
            
            background: linear-gradient(0deg, #a371f7 0%, #db61a2 50%, #f778ba 100%);
            -webkit-background-clip: text; 
            background-clip: text;
            color: transparent; 
            
            text-shadow: 0 0 5px #a371f7, 0 0 15px #db61a2, 0 0 25px #f778ba;
            
            animation: flamearNeon 0.6s ease-in-out infinite alternate;
        }

        @keyframes flamearNeon {
            0% { transform: scale(1) translateY(0); opacity: 0.9; text-shadow: 0 0 5px #a371f7, 0 0 15px #db61a2; }
            100% { transform: scale(1.05) translateY(-2px); opacity: 1; text-shadow: 0 0 7px #f778ba, 0 0 20px #db61a2, 0 0 30px #a371f7; }
        }

        /* --- Estilo de la Flecha Neón --- */
        .flecha-siguiente {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 2em;
            color: #58a6ff; /* Color Neón Azul Principal */
            text-decoration: none; /* Eliminar subrayado */
            cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease;
            text-shadow: 0 0 5px #58a6ff, 0 0 10px #58a6ff; /* Brillo inicial */
        }

        .flecha-siguiente:hover {
            color: #a371f7; /* Cambia a lila al pasar el ratón */
            transform: scale(1.1) translateX(3px); /* Se agranda y mueve un poco */
            text-shadow: 0 0 7px #a371f7, 0 0 15px #a371f7, 0 0 25px #a371f7; /* Brillo más intenso */
        }

    </style>
</head>
<body>

    <div class="card">
        <h1>
            <span class="pesa">🏋️‍♂️</span> 
            ¡Bienvenido!
            <span class="pesa">🏋️‍♂️</span>
        </h1>
        <p>Tu Gym Tracker personal con estilo neón.</p>
        
        <hr>
        
        <p><strong>¿Cómo funciona?</strong></p>
        <p>Asiste, suma <strong>1 punto</strong> y registra tu tiempo. Al final del mes, sumaremos todo (@d.gxmezz).</p>

        <h3>Registrar sesión de hoy</h3>
        <input type="number" id="minutos-input" placeholder="Minutos entrenados (ej. 60)">
        <br>
        
        <button class="btn" id="boton-sumar">¡Sumar punto de hoy!</button>

        <div id="mensaje-fuego">¡Tu punto se ha sumado! 🔥</div>

        <a href="otra-pagina.html" class="flecha-siguiente">→</a>
    </div>

    <script>
const boton = document.getElementById('boton-sumar');
    const mensaje = document.getElementById('mensaje-fuego');
    const inputMinutos = document.getElementById('minutos-input');

    boton.addEventListener('click', function() {
        const minutos = inputMinutos.value;
        
        if (minutos > 0) {
            localStorage.setItem('minutos_sesion_actual', minutos);
            
            // Esto hace que aparezca el fuego
            mensaje.style.display = 'block';
            
            setTimeout(function() {
                mensaje.style.display = 'none';
            }, 3000);
        } else {
            alert("Por favor, introduce cuántos minutos has entrenado 💪");
        }
    });
    </script>

</body>
</html>
