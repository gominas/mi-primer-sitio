<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker - Confirmar Foto</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            text-align: center; 
            margin: 0; padding: 20px;
        }
        .card { 
            background: #161b22; 
            padding: 25px; 
            border-radius: 15px; 
            border: 2px solid #a371f7; 
            box-shadow: 0 0 20px #a371f7;
            max-width: 500px; 
            margin: auto;
        }

        /* Contenedor de cámara y previa */
        .visor-container {
            position: relative;
            width: 100%;
            border-radius: 10px;
            border: 3px solid #58a6ff;
            box-shadow: 0 0 15px #58a6ff;
            background: #000;
            overflow: hidden;
            line-height: 0;
        }
        video, img#previa {
            width: 100%;
            height: auto;
            display: block;
        }
        #previa { display: none; } /* Oculto hasta que se toma la foto */

        /* Botones Neón */
        .controles { margin-top: 20px; display: flex; justify-content: center; gap: 20px; }
        
        .btn {
            border: none; padding: 15px 30px; border-radius: 10px;
            font-size: 24px; cursor: pointer; transition: 0.3s;
        }

        .btn-capturar { background: #db61a2; color: white; box-shadow: 0 0 10px #f778ba; }
        
        .btn-tik { 
            background: #238636; color: white; display: none; 
            border: 2px solid #3fb950; box-shadow: 0 0 15px #3fb950;
        }
        
        .btn-cruz { 
            background: #da3633; color: white; display: none; 
            border: 2px solid #f85149; box-shadow: 0 0 15px #f85149;
        }

        .btn:hover { transform: scale(1.1); }

        .flecha-volver {
            display: inline-block; margin-top: 30px; font-size: 2em;
            color: #58a6ff; text-decoration: none; text-shadow: 0 0 10px #58a6ff;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="titulo">📸 aprieta el musculo!</h1>
        
        <div class="visor-container">
            <video id="video" autoplay playsinline></video>
            <img id="previa" src="" alt="Previa de tu foto">
        </div>

        <div class="controles">
            <button id="btn-foto" class="btn btn-capturar">TOMAR FOTO</button>
            
            <button id="btn-cruz" class="btn btn-cruz">❌</button>
            <button id="btn-tik" class="btn btn-tik">✅</button>
        </div>

        <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

        <a href="index.html" class="flecha-volver">←</a>
    </div>

    <script>
        const video = document.getElementById('video');
        const previa = document.getElementById('previa');
        const btnFoto = document.getElementById('btn-foto');
        const btnTik = document.getElementById('btn-tik');
        const btnCruz = document.getElementById('btn-cruz');
        const canvas = document.getElementById('canvas');
        let fotoGuardada = null;

        // Iniciar cámara
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            video.srcObject = stream;
        });

        // Al dar clic en TOMAR FOTO
        btnFoto.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            fotoGuardada = canvas.toDataURL('image/png');
            
            // Mostrar imagen, ocultar video
            previa.src = fotoGuardada;
            previa.style.display = 'block';
            video.style.display = 'none';
            
            // Cambiar botones
            btnFoto.style.display = 'none';
            btnTik.style.display = 'block';
            btnCruz.style.display = 'block';
            document.getElementById('titulo').innerText = "¿Te gusta esta foto?";
        });

        // Al dar clic en la CRUZ (Repetir)
        btnCruz.addEventListener('click', () => {
            previa.style.display = 'none';
            video.style.display = 'block';
            btnFoto.style.display = 'block';
            btnTik.style.display = 'none';
            btnCruz.style.display = 'none';
            document.getElementById('titulo').innerText = "📸 Captura tu Progreso";
        });

        // Al dar clic en el TIK (Guardar e ir a la siguiente página)
        btnTik.addEventListener('click', () => {
            // Aquí en el futuro usaremos base de datos, por ahora solo navegamos
            window.location.href = "galeria-final.html"; 
        });
    </script>
</body>
</html>
