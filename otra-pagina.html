<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker - Fotos Neón</title>
    <style>
        /* --- Diseño General (CSS) Estilo Neón --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0d1117; /* Fondo súper oscuro */
            color: #c9d1d9; /* Texto gris muy claro */
            text-align: center; 
            padding: 20px; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Centrado vertical */
        }
        
        .card { 
            background: #161b22; /* Fondo de la tarjeta oscuro */
            padding: 30px; 
            border-radius: 15px; 
            /* Borde y sombra Neón Lila Principal */
            border: 2px solid #a371f7; 
            box-shadow: 0 0 10px #a371f7, 0 0 20px #a371f7, inset 0 0 10px #a371f7;
            max-width: 500px; 
            width: 100%;
            position: relative; 
            overflow: visible; 
        }

        h1 { 
            color: #fff; /* Título blanco */
            margin-bottom: 20px; 
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #a371f7, 0 0 30px #a371f7; /* Brillo Neón en Título */
        }

        /* --- Estilo de la Cámara Neón --- */
        #video-container {
            position: relative;
            padding-bottom: 75%; /* Ratio 4:3 para el video */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            /* Borde neón azul para la cámara */
            border: 3px solid #58a6ff;
            box-shadow: 0 0 15px #58a6ff;
            background: #000;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajusta el video para llenar el contenedor */
        }

        #canvas { display: none; } /* Oculto, solo sirve para procesar la foto */

        /* El Botón de Foto - Neón Rosa/Fucsia */
        .btn-foto {
            background-color: #db61a2; 
            color: white; 
            border: 2px solid #f778ba; 
            padding: 12px 24px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 5px #f778ba;
        }
        .btn-foto:hover { 
            background-color: #f778ba; 
            box-shadow: 0 0 15px #f778ba, 0 0 25px #f778ba;
        }

        hr { 
            border: 0; 
            border-top: 2px solid #30363d; /* Separador oscuro */
            margin: 30px 0; 
        }

        h3 {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #58a6ff;
            margin-bottom: 15px;
        }

        /* --- Galería de Fotos Neón --- */
        .galeria {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .foto-contenedor {
            background: #0d1117;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #30363d;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .foto-contenedor:hover {
            border-color: #3fb950; /* Cambia a verde neón al pasar el ratón */
            box-shadow: 0 0 10px #3fb950;
        }

        .foto-contenedor img {
            width: 100%;
            border-radius: 5px;
            filter: drop-shadow(0 0 2px rgba(255,255,255,0.3)); /* Brillo sutil para la foto */
        }

        .fecha-foto {
            font-size: 0.85em;
            color: #58a6ff; /* Neón Azul */
            margin-top: 8px;
            font-weight: bold;
            text-shadow: 0 0 3px #58a6ff;
        }

        /* Flecha de Volver Neón Azul */
        .flecha-volver {
            display: inline-block;
            margin-top: 30px;
            font-size: 2.2em;
            color: #58a6ff;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease;
            text-shadow: 0 0 5px #58a6ff, 0 0 10px #58a6ff;
        }

        .flecha-volver:hover {
            color: #a371f7; /* Cambia a lila */
            transform: scale(1.1) translateX(-3px);
            text-shadow: 0 0 7px #a371f7, 0 0 15px #a371f7, 0 0 25px #a371f7;
        }

    </style>
</head>
<body>

    <div class="card">
        <h1>📸 Progreso Neón</h1>
        
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
        </div>
        
        <button class="btn-foto" id="snap">TOMAR FOTO</button>
        
        <canvas id="canvas" width="640" height="480"></canvas>

        <hr>

        <h3>Galería del Mes</h3>
        <div class="galeria" id="galeria">
            </div>

        <a href="index.html" class="flecha-volver">←</a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap');
        const galeria = document.getElementById('galeria');

        // 1. Pedir permiso para usar la cámara
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then((stream) => {
                video.srcObject = stream;
            })
            .catch((err) => {
                console.error("Error al acceder a la cámara: " + err);
                alert("Por favor, permite el acceso a la cámara y usa una conexión HTTPS segura.");
            });

        // 2. Función para tomar la foto
        snap.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            // Convertir la foto a una imagen real
            const dataUrl = canvas.toDataURL('image/png');
            
            // Crear la fecha de hoy
            const hoy = new Date();
            // Formato de fecha más "digital": DD/MM/AAAA - HH:MM
            const fechaTexto = hoy.toLocaleDateString() + " - " + hoy.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            // Crear el elemento en la galería
            const div = document.createElement('div');
            div.className = 'foto-contenedor';
            div.innerHTML = `
                <img src="${dataUrl}">
                <div class="fecha-foto">${fechaTexto}</div>
            `;
            
            galeria.prepend(div); // Poner la foto más nueva arriba
        });
    </script>

</body>
</html>
